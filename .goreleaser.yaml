---
version: 2

builds:
  - id: kyaml
    main: ./cmd/kyaml/
    binary: kyaml
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: kyaml
    builds:
      - kyaml
    formats:
      - tar.gz
    name_template: "kyaml_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true
